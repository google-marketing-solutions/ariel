<div class="result-container">
  <h2>Generated Video</h2>

  <!-- Video Player -->
  <div class="result-player">
    <video controls [src]="finalVideoData()?.video_url">
      Your browser does not support the video tag.
    </video>
  </div>

  <!-- Action Buttons -->
  <div class="actions-row">
    <!-- Download Actions -->
    <div class="download-actions">
      <a [href]="finalVideoData()?.video_url" [download]="getCleanVideoName()"> Download Video </a>
      <a [href]="finalVideoData()?.merged_audio_url" [download]="getCleanAudioName('audio')">
        Download Final Audio
      </a>
      <a [href]="finalVideoData()?.vocals_url" [download]="getCleanAudioName('vocals')">
        Download Vocals
      </a>
    </div>

    <!-- System Actions -->
    <div class="system-actions">
      <button (click)="goBack()" class="back-btn">Go back to editing</button>
      <button (click)="startOver()" class="start-over-btn">Start Over</button>
    </div>
  </div>
</div>
