<div

  [class.h-screen]="isEditorRoute" [class.overflow-hidden]="isEditorRoute" [class.min-h-screen]="!isEditorRoute">

  <app-header [isDarkMode]="isDarkMode()" (toggleTheme)="toggleTheme()"></app-header>

  <main class="flex flex-1 relative z-0" [class.overflow-hidden]="isEditorRoute"
    [class.overflow-y-auto]="!isEditorRoute" [class.custom-scrollbar]="!isEditorRoute" [class.p-6]="!isEditorRoute"
    [class.lg:p-12]="!isEditorRoute" [class.flex-col]="!isEditorRoute">
    <router-outlet></router-outlet>
  </main>

  <div class="fixed bottom-4 right-1 text-xs text-slate-500 dark:text-slate-400 z-50">
  v2.2
</div>
</div>
