<header
  class="h-16 shrink-0 border-b border-[#0000000d] dark:border-[#334155] bg-white/80 dark:bg-[#1e293b]/80 backdrop-blur-[12px] flex items-center justify-between px-6 shadow-glass-light dark:shadow-glass-dark z-10 relative">
  <div class="flex items-center gap-8 h-full">
    <div class="flex items-center gap-2 mr-8">
      <img src="Image/Ariel_Logo.png" alt="Ariel Logo" class="logo-img me-3 h-8" />
      <h2
        class="text-2xl font-heading font-bold tracking-tight bg-gradient-to-r from-[#2563eb] to-[#8b5cf6] dark:from-[#2563eb] dark:to-[#3b82f6] bg-clip-text text-transparent">
        Ariel v2
      </h2>
    </div>

    <!-- Navigation Menu -->
    <div class="flex items-center gap-8 h-full">
      <a routerLink="/" routerLinkActive="text-primary dark:text-[#60a5fa]" [routerLinkActiveOptions]="{exact: true}"
        class="h-full flex items-center relative text-base font-semibold text-slate-500 dark:text-[#94a3b8] hover:text-slate-800 dark:hover:text-[#f1f5f9] transition-colors group">
        Home
        <!-- Active Indicator -->
        <div
          class="absolute bottom-0 left-0 right-0 h-[2px] bg-primary dark:bg-[#60a5fa] rounded-t-full opacity-0 [a.text-primary_&]:opacity-100 dark:[a.text-\[\#60a5fa\]_&]:opacity-100">
        </div>
      </a>
      <a routerLink="/library" routerLinkActive="text-primary dark:text-[#60a5fa]"
        class="h-full flex items-center relative text-base font-semibold text-slate-500 dark:text-[#94a3b8] hover:text-slate-800 dark:hover:text-[#f1f5f9] transition-colors group">
        Library
        <!-- Active Indicator -->
        <div
          class="absolute bottom-0 left-0 right-0 h-[2px] bg-primary dark:bg-[#60a5fa] rounded-t-full opacity-0 [a.text-primary_&]:opacity-100 dark:[a.text-\[\#60a5fa\]_&]:opacity-100">
        </div>
      </a>
    </div>
  </div>

  <!-- Actions Menu -->
  <div class="flex items-center gap-4">

    @if (isEditorRoute) {
    <!-- Unregenerated Warning -->
    @if ((videoGenerationService.unregeneratedCount$ | async) ?? 0; as count) {
    <div class="flex items-center gap-1.5 mr-2 cursor-help"
      matTooltip="You have {{count}} utterance(s) with changed text or voices that have not been regenerated yet. These changes will NOT be included in the final video until you click Regenerate on the respective utterance cards.">
      <span class="text-sm font-semibold text-amber-600 dark:text-amber-400">{{ count }} change(s) need regeneration</span>
      <span class="material-symbols-outlined text-amber-500 text-[16px]">info</span>
    </div>
    }

    <button
      (click)="generateVideo()"
      class="flex items-center gap-2 rounded-xl bg-[#2563eb] dark:bg-gradient-to-br dark:from-[#2563eb] dark:to-[#3b82f6] px-5 py-2 text-sm font-semibold text-white shadow-[0_0_15px_-3px_rgba(37,99,235,0.3)] hover:translate-y-[-1px] transition-all active:scale-95">
      Generate Video
    </button>
    <div class="w-px h-6 bg-slate-200 dark:bg-slate-700"></div>
    }

    <button (click)="onToggleTheme()"
      class="w-10 h-10 rounded-full flex items-center justify-center bg-slate-100 dark:bg-[#0f172a] hover:bg-slate-200 dark:hover:bg-black/20 text-slate-600 dark:text-[#94a3b8] transition-colors border border-black/5 dark:border-[#334155]">
      <span class="material-symbols-outlined text-xl">
        {{ isDarkMode ? 'light_mode' : 'dark_mode' }}
      </span>
    </button>

  </div>
</header>
