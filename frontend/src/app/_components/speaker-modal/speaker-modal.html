<!-- Overlay -->
<div class="modal-overlay" (click)="closeModal()"></div>

<!-- Modal -->
<div class="modal-container">
  <div class="modal-dialog">

    <!-- Header -->
    <div class="modal-header">
      <h3>Select Speaker Voice</h3>
      <button (click)="closeModal()" class="close-btn">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>

    <!-- Body -->
    <div class="modal-body">

      <!-- Speaker Name Input -->
      <div class="form-group">
        <label>Speaker Name</label>
        <input type="text" [(ngModel)]="speakerName" placeholder="e.g., Narrator" />
      </div>

      <div class="divider"></div>

      <!-- Search & Filters -->
      <div class="filters-row">
        <div class="search-wrapper">
          <span class="material-symbols-outlined">search</span>
          <input type="text" [(ngModel)]="searchQuery" placeholder="Search voices..." />
        </div>

        <!-- Segmented Toggle for Gender -->
        <div class="segmented-toggle">
          <button (click)="genderFilter.set('all')" [class.active]="genderFilter() === 'all'">All</button>
          <button (click)="genderFilter.set('Male')" [class.active]="genderFilter() === 'Male'">Male</button>
          <button (click)="genderFilter.set('Female')" [class.active]="genderFilter() === 'Female'">Female</button>
        </div>
      </div>

      <!-- Voice List -->
      <div class="voice-list">
        @for (voice of filteredVoices(); track voice.name) {
        <div class="voice-item">

          <div class="voice-info">
            <span>{{ voice.name }}</span>
          </div>

          <div class="voice-actions">
            <span class="gender-badge">
              {{ voice.gender }}
            </span>

            @if (voice.url) {
            <button (click)="togglePlay(voice, $event)" class="control-btn">
              <span class="material-symbols-outlined text-[16px]">{{ currentlyPlayingVoiceName() === voice.name ? 'stop' : 'play_arrow' }}</span>
            </button>
            }

            <button (click)="selectVoice(voice)" class="select-btn">
              Select
            </button>
          </div>

        </div>
        } @empty {
        <div class="empty-list">
          No voices found matching your criteria.
        </div>
        }
      </div>

    </div>
  </div>
</div>
